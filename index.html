<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Demo App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      padding: 100px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      opacity: 0.9;
    }

    .status {
      margin-top: 30px;
      padding: 15px;
      display: inline-block;
      background: #00c853;
      color: black;
      font-weight: bold;
      border-radius: 8px;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      font-size: 14px;
      opacity: 0.7;
    }

    button {
      margin-top: 30px;
      padding: 12px 25px;
      border: none;
      border-radius: 6px;
      background: white;
      color: #2a5298;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚀 DevOps Deployment Success</h1>
    <p>If you can see this, your CI/CD is working.</p>

    <div class="status">✅ Server is Live</div>

    <br>

    <button onclick="showMessage()">Check Interaction</button>

    <p id="msg"></p>
  </div>

  <div class="footer">
    Deployed using AWS EC2 + Nginx + GitHub Actions
  </div>

  <script>
    function showMessage() {
      document.getElementById("msg").innerText =
        "🎉 JavaScript is working. Your deployment is not completely broken.";
    }
  </script>

</body>
</html>
